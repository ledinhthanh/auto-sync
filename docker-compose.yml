version: '3.8'

services:
  app:
    build: .
    ports:
      - "3030:3000"
    environment:
      - DATABASE_URL=postgresql://datasync_user:datasync_password@db:5432/datasync_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: datasync_user
      POSTGRES_PASSWORD: datasync_password
      POSTGRES_DB: datasync_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasync_user -d datasync_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
